apiVersion: v1
kind: Plugin
metadata:
  author: langbot-team
  name: SysStatPlugin
  repository: https://github.com/langbot-app/langbot-plugin-demo
  version: 0.2.3
  description:
    en_US: View system status including CPU, memory, and disk usage
    zh_Hans: 查看系统状态，包括 CPU、内存和磁盘使用情况
    zh_Hant: 系統狀態插件，提供查看 LangBot 系統運行狀態的指令。
    ja_JP: システム状態プラグイン。LangBotシステムの稼働状態を確認するコマンドを提供します。
    vi_VN: Plugin trạng thái hệ thống, cung cấp lệnh xem trạng thái hoạt động 
      của hệ thống LangBot.
    th_TH: ปลั๊กอินสถานะระบบ ให้คำสั่งดูสถานะการทำงานของระบบ LangBot
    es_ES: Plugin de estado del sistema que proporciona comandos para consultar 
      el estado de ejecución del sistema LangBot.
  label:
    en_US: SysStat
    zh_Hans: 系统状态
    zh_Hant: SysStat
    ja_JP: SysStat
    vi_VN: SysStat
    th_TH: SysStat
    es_ES: SysStat
  icon: assets/icon.svg
spec:
  config: []
  components:
    Command:
      fromDirs:
      - path: components/commands/
execution:
  python:
    path: main.py
    attr: SysStatPlugin
