apiVersion: v1
kind: RAGEngine
metadata:
  name: langrag
  label:
    en_US: LangRAG
    zh_Hans: LangRAG
  description:
    en_US: Simple RAG Engine with document chunking, vector, full-text, and hybrid retrieval
    zh_Hans: 简单 RAG 引擎，支持文档分块及向量、全文、混合检索
spec:
  creation_schema:
    - name: embedding_model_uuid
      label:
        en_US: Embedding Model
        zh_Hans: 嵌入模型
      description:
        en_US: Select embedding model for text vectorization
        zh_Hans: 选择用于文本向量化的嵌入模型
      type: embedding-model-selector
      required: true
      default: ''
    - name: index_type
      label:
        en_US: Index Type
        zh_Hans: 索引类型
      description:
        en_US: 'Chunk: flat chunking; Parent-Child: two-level chunking for richer context'
        zh_Hans: 'Chunk：平坦分块；Parent-Child：双层分块，检索返回更丰富上下文'
      type: select
      required: false
      default: chunk
      options:
        - name: chunk
          label:
            en_US: Chunk
            zh_Hans: 分块
        - name: parent_child
          label:
            en_US: Parent-Child
            zh_Hans: 父子索引
    - name: chunk_size
      label:
        en_US: Chunk Size
        zh_Hans: 分块大小
      type: integer
      required: false
      default: 512
    - name: overlap
      label:
        en_US: Chunk Overlap
        zh_Hans: 分块重叠
      type: integer
      required: false
      default: 50
    - name: parent_chunk_size
      label:
        en_US: Parent Chunk Size
        zh_Hans: 父块大小
      description:
        en_US: Size of parent chunks (only used with Parent-Child index type)
        zh_Hans: 父块大小（仅在 Parent-Child 索引类型下生效）
      type: integer
      required: false
      default: 2048
    - name: child_chunk_size
      label:
        en_US: Child Chunk Size
        zh_Hans: 子块大小
      description:
        en_US: Size of child chunks (only used with Parent-Child index type)
        zh_Hans: 子块大小（仅在 Parent-Child 索引类型下生效）
      type: integer
      required: false
      default: 256
  retrieval_schema:
    - name: top_k
      label:
        en_US: Top K
        zh_Hans: 召回数量
      type: integer
      required: false
      default: 5
    - name: search_type
      label:
        en_US: Search Type
        zh_Hans: 检索类型
      description:
        en_US: 'Vector: semantic similarity; Full-text: keyword matching; Hybrid: combined'
        zh_Hans: 'Vector：语义相似度；Full-text：关键词匹配；Hybrid：混合检索'
      type: select
      required: false
      default: vector
      options:
        - name: vector
          label:
            en_US: Vector
            zh_Hans: 向量检索
        - name: full_text
          label:
            en_US: Full-text
            zh_Hans: 全文检索
        - name: hybrid
          label:
            en_US: Hybrid
            zh_Hans: 混合检索
execution:
  python:
    path: langrag.py
    attr: LangRAG
