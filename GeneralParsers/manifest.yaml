apiVersion: v1
kind: Plugin
metadata:
  author: langbot-team
  name: GeneralParsers
  repository: 'https://github.com/langbot-app/langbot-plugin-demo'
  version: 0.1.3
  description:
    en_US: 'General Parsers - Extract text from PDF, Word, Markdown, HTML, TXT, and image files'
    zh_Hans: '通用解析器 - 从 PDF、Word、Markdown、HTML、TXT 和图片文件中提取文本'
  label:
    en_US: GeneralParsers
    zh_Hans: 通用解析器
  icon: assets/icon.svg

spec:
  config:
    - name: vision_llm_model_uuid
      label:
        en_US: Vision Model
        zh_Hans: 视觉模型
      type: llm-model-selector
      required: false
      description:
        en_US: 'Optional: Select a vision-capable LLM to enable OCR for scanned pages and recognize images in PDFs, DOCX, and direct image uploads'
        zh_Hans: '可选：选择视觉模型，自动识别扫描页文字，并识别 PDF、DOCX 以及直接上传图片中的内容'
  components:
    Parser:
      fromDirs:
        - path: components/general_parsers/

execution:
  python:
    path: main.py
    attr: GeneralParsersPlugin
