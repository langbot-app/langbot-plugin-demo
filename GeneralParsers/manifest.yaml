apiVersion: v1
kind: Plugin
metadata:
  author: langbot-team
  name: GeneralParsers
  repository: ''
  version: 0.1.2
  description:
    en_US: 'General Parsers - Extract text from PDF, Word, Markdown, HTML, and TXT files'
    zh_Hans: '通用解析器 - 从 PDF、Word、Markdown、HTML、TXT 文件中提取文本'
  label:
    en_US: GeneralParsers
    zh_Hans: 通用解析器
  icon: assets/icon.svg

spec:
  config:
    - name: vision_llm_model_uuid
      label:
        en_US: Vision Model
        zh_Hans: 视觉模型
      type: llm-model-selector
      required: false
      description:
        en_US: 'Optional: Select a vision-capable LLM to enable OCR for scanned pages and image description'
        zh_Hans: '可选：选择视觉模型，自动识别扫描页文字、描述 PDF 中的图片'
  components:
    Parser:
      fromDirs:
        - path: components/general_parsers/

execution:
  python:
    path: main.py
    attr: GeneralParsersPlugin

