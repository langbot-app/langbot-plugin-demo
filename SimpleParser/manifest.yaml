apiVersion: v1
kind: Plugin
metadata:
  author: langbot-app
  name: SimpleParser
  repository: ''
  version: 0.1.0
  description:
    en_US: 'Simple Parser - Extract text from PDF, Word, Markdown, HTML, and TXT files'
    zh_Hans: '简单解析器 - 从 PDF、Word、Markdown、HTML、TXT 文件中提取文本'
  label:
    en_US: SimpleParser
    zh_Hans: 简单解析器
  icon: assets/icon.svg

spec:
  config: []
  components:
    Parser:
      fromDirs:
        - path: components/parser/

execution:
  python:
    path: main.py
    attr: SimpleParserPlugin
