apiVersion: v1
kind: Plugin
metadata:
  author: RockChinQ
  name: AgenticRAG
  repository: 'https://github.com/langbot-app/langbot-plugin-demo'
  version: 0.1.0
  description:
    en_US: Agentic RAG plugin that exposes knowledge base retrieval as a Tool, allowing the Agent to autonomously decide when and what to search.
    zh_Hans: Agentic RAG 插件，将知识库检索以 Tool 形式暴露给 Agent，让 Agent 自主决定检索时机和策略。
  label:
    en_US: AgenticRAG
    zh_Hans: AgenticRAG
  icon: assets/icon.svg
spec:
  config: []
  components:
    Tool:
      fromDirs:
      - path: components/tools/
execution:
  python:
    path: main.py
    attr: AgenticRAG
