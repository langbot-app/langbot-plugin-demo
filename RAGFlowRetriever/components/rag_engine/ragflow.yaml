apiVersion: v1
kind: KnowledgeEngine
metadata:
  name: ragflow-rag
  label:
    en_US: RAGFlow Knowledge Base
    zh_Hans: RAGFlow 知识库
    ja_JP: RAGFlow 知識ベース
  description:
    en_US: Retrieve knowledge from RAGFlow knowledge bases
    zh_Hans: 从 RAGFlow 知识库中检索知识
    ja_JP: RAGFlow 知識ベースから知識を検索
spec:
  creation_schema:
    - name: api_base_url
      label:
        en_US: API Base URL
        zh_Hans: API 基础地址
        ja_JP: API ベース URL
      description:
        en_US: 'Base URL for RAGFlow API (e.g., http://localhost:9380 for local, or your server URL)'
        zh_Hans: 'RAGFlow API 基础地址（本地版本使用 http://localhost:9380，或使用您的服务器地址）'
        ja_JP: 'RAGFlow API ベース URL（ローカル版は http://localhost:9380、またはサーバーの URL）'
      type: string
      default: http://localhost:9380
      required: true
    - name: api_key
      label:
        en_US: API Key
        zh_Hans: API 密钥
        ja_JP: API キー
      description:
        en_US: 'API key from your RAGFlow instance'
        zh_Hans: '从您的 RAGFlow 实例获取的 API Key'
        ja_JP: 'RAGFlow インスタンスから取得した API Key'
      type: password
      required: true
    - name: dataset_ids
      label:
        en_US: Dataset IDs
        zh_Hans: 数据集 IDs
        ja_JP: データセット ID
      description:
        en_US: 'Comma-separated dataset IDs to search (e.g., "id1,id2,id3")'
        zh_Hans: '要搜索的数据集 ID，用逗号分隔（例如："id1,id2,id3"）'
        ja_JP: '検索するデータセット ID（カンマ区切り、例："id1,id2,id3"）'
      type: string
      required: true
    - name: top_k
      label:
        en_US: Top K
        zh_Hans: 返回数量
        ja_JP: 取得件数
      description:
        en_US: 'Maximum number of results to retrieve'
        zh_Hans: '检索结果的最大数量'
        ja_JP: '検索結果の最大数'
      type: integer
      default: 1024
      required: false
    - name: similarity_threshold
      label:
        en_US: Similarity Threshold
        zh_Hans: 相似度阈值
        ja_JP: 類似度しきい値
      description:
        en_US: 'Minimum similarity score (0-1)'
        zh_Hans: '最小相似度分数 (0-1)'
        ja_JP: '最小類似性スコア (0-1)'
      type: float
      default: 0.2
      required: false
    - name: vector_similarity_weight
      label:
        en_US: Vector Similarity Weight
        zh_Hans: 向量相似度权重
        ja_JP: ベクトル類似性の重み
      description:
        en_US: 'Weight for vector similarity in hybrid search (0-1)'
        zh_Hans: '混合检索中向量相似度的权重 (0-1)'
        ja_JP: 'ハイブリッド検索におけるベクトル類似性の重み (0-1)'
      type: float
      default: 0.3
      required: false
    - name: page_size
      label:
        en_US: Page Size
        zh_Hans: 每页大小
        ja_JP: ページサイズ
      description:
        en_US: 'Number of results per page'
        zh_Hans: '每页返回的结果数量'
        ja_JP: 'ページごとの結果数'
      type: integer
      default: 30
      required: false
  retrieval_schema: []
execution:
  python:
    path: engine.py
    attr: RAGFlowKnowledgeEngine
