apiVersion: v1
kind: Plugin
metadata:
  author: RockChinQ
  name: FAQManager
  repository: https://github.com/langbot-app/langbot-plugin-demo
  version: 0.1.0
  description:
    en_US: Manage FAQ entries via a visual page and let the LLM search them during conversations.
    zh_Hans: 通过可视化页面管理常见问答条目，并让 LLM 在对话中检索它们。
  label:
    en_US: FAQ Manager
    zh_Hans: FAQ 管理器
  icon: assets/icon.svg
spec:
  config: []
  components:
    EventListener:
      fromDirs:
      - path: components/event_listener/
    Tool:
      fromDirs:
      - path: components/tools/
    Page:
      fromDirs:
      - path: components/pages/
        maxDepth: 2
execution:
  python:
    path: main.py
    attr: FAQManagerPlugin
