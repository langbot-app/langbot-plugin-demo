apiVersion: v1
kind: Plugin
metadata:
  author: langbot-team
  name: LangRAG
  repository: 'https://github.com/langbot-app/langbot-plugin-demo'
  version: 0.1.0
  description:
    en_US: 'LangBot Knowledge Engine - Document ingestion and vector retrieval using Host infrastructure'
    zh_Hans: 'LangBot RAG 引擎 - 使用宿主基础设施进行文档摄入和向量检索'
  label:
    en_US: LangRAG
    zh_Hans: LangRAG
  icon: assets/icon.svg

spec:
  config: []
  components:
    KnowledgeEngine:
      fromFiles:
        - components/knowledge_engine/langrag.yaml

execution:
  python:
    path: main.py
    attr: LangRAG
