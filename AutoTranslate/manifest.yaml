apiVersion: v1
kind: Plugin
metadata:
  author: langbot-team
  name: AutoTranslate
  repository: 'https://github.com/langbot-app/langbot-plugin-demo'
  version: 0.1.0
  description:
    en_US: 'Automatically detect foreign language messages and translate them using LLM. Supports configurable target language and translation style.'
    zh_Hans: '自动检测外语消息并使用 LLM 翻译。支持配置目标语言和翻译风格。'
  label:
    en_US: Auto Translate
    zh_Hans: 自动翻译
  icon: assets/icon.svg
spec:
  config:
    - name: target_language
      type: select
      label:
        en_US: 'Target Language'
        zh_Hans: '目标语言'
      description:
        en_US: 'Translate foreign messages into this language'
        zh_Hans: '将外语消息翻译为此语言'
      required: false
      default: 'zh_Hans'
      options:
        - label:
            en_US: 'Chinese (Simplified)'
            zh_Hans: '简体中文'
          name: 'zh_Hans'
        - label:
            en_US: 'English'
            zh_Hans: '英语'
          name: 'en_US'
        - label:
            en_US: 'Japanese'
            zh_Hans: '日语'
          name: 'ja_JP'
        - label:
            en_US: 'Korean'
            zh_Hans: '韩语'
          name: 'ko_KR'
        - label:
            en_US: 'French'
            zh_Hans: '法语'
          name: 'fr_FR'
        - label:
            en_US: 'Spanish'
            zh_Hans: '西班牙语'
          name: 'es_ES'
    - name: model
      type: llm-model-selector
      label:
        en_US: 'LLM Model'
        zh_Hans: 'LLM 模型'
      description:
        en_US: 'Select the LLM model for translation. If not set, the first available model will be used.'
        zh_Hans: '选择用于翻译的 LLM 模型。未设置时使用第一个可用模型。'
      required: false
    - name: min_text_length
      type: int
      label:
        en_US: 'Minimum Text Length'
        zh_Hans: '最短文本长度'
      description:
        en_US: 'Skip messages shorter than this (default 4 chars)'
        zh_Hans: '跳过短于此长度的消息（默认 4 字符）'
      required: false
      default: 4
    - name: enable_private
      type: bool
      label:
        en_US: 'Enable in Private Chat'
        zh_Hans: '在私聊中启用'
      description:
        en_US: 'Also translate in private messages (default: group only)'
        zh_Hans: '在私聊中也进行翻译（默认仅群聊）'
      required: false
      default: false
  components:
    EventListener:
      fromDirs:
      - path: components/event_listener/
execution:
  python:
    path: main.py
    attr: AutoTranslate
