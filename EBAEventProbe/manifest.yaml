apiVersion: v1
kind: Plugin
metadata:
  author: LangBot
  name: EBAEventProbe
  repository: https://github.com/langbot-app/langbot-plugin-demo
  version: 0.1.0
  description:
    en_US: Probe plugin for validating Event-Based Agent event delivery.
    zh_Hans: 用于验证 Event-Based Agent 事件分发的探针插件。
  label:
    en_US: EBA Event Probe
    zh_Hans: EBA 事件探针
  icon: assets/icon.svg
spec:
  config: []
  components:
    EventListener:
      fromDirs:
        - path: components/event_listener/
execution:
  python:
    path: main.py
    attr: EBAEventProbePlugin
